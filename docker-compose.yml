services:
  postgres:
    image: postgres:16-alpine
    container_name: primeguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: primeguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: primeguard-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/primeguard?schema=public
      NODE_ENV: production
      PORT: 5000
      API_PREFIX: /api/v1
      CLIENT_URL: http://localhost:5173
      APP_NAME: PrimeGuard API
      ACCESS_TOKEN_SECRET: change-this-to-a-long-access-secret-for-production
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: change-this-to-a-long-refresh-secret-for-production
      REFRESH_TOKEN_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 12
      LOG_LEVEL: info
      JSON_BODY_LIMIT: 1mb
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 10
      API_RATE_LIMIT_WINDOW_MS: 900000
      API_RATE_LIMIT_MAX: 200
    ports:
      - "5000:5000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: primeguard-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:
